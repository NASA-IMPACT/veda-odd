<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="720" viewBox="0 0 1320 720">
  <rect x="0" y="0" width="1320" height="720" fill="#ffffff"/>
  <rect x="0" y="0" width="1320" height="78" fill="#0b2545"/>
  <rect x="0" y="74" width="1320" height="4" fill="#64748b"/>
  <text x="40" y="42" font-family="Liberation Sans, Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="bold">Architecture at 10,000 ft</text>
  <text x="40" y="66" font-family="Liberation Sans, Arial, sans-serif" font-size="16" fill="#9fc6e0">From the data lake out to user interfaces &#8212; plus direct access via a cloud-hosted dev environment.</text>
  <text x="1280" y="44" font-family="Liberation Sans, Arial, sans-serif" font-size="14" fill="#9fc6e0" font-weight="bold" text-anchor="end">NASA Data System Evolution (DSE)</text>
  <text x="1280" y="64" font-family="Liberation Sans, Arial, sans-serif" font-size="12" fill="#6f97b8" text-anchor="end">Architecture Vision</text>

  <!-- legend -->
  <rect x="40" y="110" width="22" height="11" fill="#0e7490"/>
  <text x="70" y="120" font-family="Liberation Sans, Arial, sans-serif" font-size="13" fill="#0e7490" font-weight="bold">new data lake</text>
  <rect x="180" y="110" width="22" height="11" fill="#64748b"/>
  <text x="210" y="120" font-family="Liberation Sans, Arial, sans-serif" font-size="13" fill="#64748b" font-weight="bold">existing / neutral</text>

  <!-- main flow row: data (left) served out to users (right), matching the reference architecture -->
  <!-- 1 Archival Files (neutral) -->
  <rect x="40" y="150" width="220" height="80" rx="0" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <rect x="40" y="150" width="9" height="80" fill="#64748b"/>
  <text x="64" y="182" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold">Archival Files</text>
  <text x="64" y="202" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">HDF5 / netCDF</text>
  <text x="64" y="218" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">object storage (S3)</text>

  <!-- 2 Icechunk (highlight) -->
  <rect x="295" y="150" width="220" height="80" rx="0" fill="#eef6f8" stroke="#0e7490" stroke-width="2.8"/>
  <rect x="295" y="150" width="9" height="80" fill="#0e7490"/>
  <text x="319" y="182" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold">Icechunk</text>
  <text x="319" y="202" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">Zarr arrays (n-D)</text>
  <text x="319" y="218" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">virtual or native</text>

  <!-- 3 Query Engine (highlight) -->
  <rect x="550" y="150" width="220" height="80" rx="0" fill="#eef6f8" stroke="#0e7490" stroke-width="2.8"/>
  <rect x="550" y="150" width="9" height="80" fill="#0e7490"/>
  <text x="574" y="182" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold">Query Engine</text>
  <text x="574" y="202" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">DataFusion</text>
  <text x="574" y="218" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">discover &amp; filter collections</text>

  <!-- 4 APIs (neutral) -->
  <rect x="805" y="150" width="220" height="80" rx="0" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <rect x="805" y="150" width="9" height="80" fill="#64748b"/>
  <text x="829" y="182" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold">APIs</text>
  <text x="829" y="202" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">subset &#183; reformat &#183; tiles</text>
  <text x="829" y="218" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">timeseries &#183; custom products</text>

  <!-- 5 User Interfaces (neutral) -->
  <rect x="1060" y="150" width="220" height="80" rx="0" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <rect x="1060" y="150" width="9" height="80" fill="#64748b"/>
  <text x="1084" y="182" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold">User Interfaces</text>
  <text x="1084" y="202" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">web apps &#183; notebooks</text>
  <text x="1084" y="218" font-family="Liberation Sans, Arial, sans-serif" font-size="11" fill="#475569">python / HTTP clients</text>

  <!-- flow arrows: served left -> right -->
  <line x1="260" y1="190" x2="289" y2="190" stroke="#64748b" stroke-width="2.6"/>
  <polygon points="295,190 285,185.5 285,194.5" fill="#64748b"/>
  <line x1="515" y1="190" x2="544" y2="190" stroke="#64748b" stroke-width="2.6"/>
  <polygon points="550,190 540,185.5 540,194.5" fill="#64748b"/>
  <line x1="770" y1="190" x2="799" y2="190" stroke="#64748b" stroke-width="2.6"/>
  <polygon points="805,190 795,185.5 795,194.5" fill="#64748b"/>
  <line x1="1025" y1="190" x2="1054" y2="190" stroke="#64748b" stroke-width="2.6"/>
  <polygon points="1060,190 1050,185.5 1050,194.5" fill="#64748b"/>

  <!-- cloud-hosted dev environment -->
  <rect x="40" y="440" width="1020" height="92" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="550" y="476" font-family="Liberation Sans, Arial, sans-serif" font-size="17" fill="#0f172a" font-weight="bold" text-anchor="middle">Cloud-hosted development environment</text>
  <text x="550" y="502" font-family="Liberation Sans, Arial, sans-serif" font-size="13" fill="#475569" text-anchor="middle">notebooks co-located with the data in AWS us-west-2</text>
  <text x="550" y="520" font-family="Liberation Sans, Arial, sans-serif" font-size="13" fill="#475569" text-anchor="middle">power users go straight to the data, bypassing the API / query layer</text>

  <!-- direct access up from dev env: Icechunk (new, teal) and Archival (existing, grey) -->
  <line x1="405" y1="440" x2="405" y2="238" stroke="#0e7490" stroke-width="2.6" stroke-dasharray="9 6"/>
  <polygon points="405,232 400.5,242 409.5,242" fill="#0e7490"/>
  <text x="419" y="345" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#0e7490" font-weight="bold">direct Icechunk access</text>

  <line x1="150" y1="440" x2="150" y2="238" stroke="#64748b" stroke-width="2.6" stroke-dasharray="9 6"/>
  <polygon points="150,232 145.5,242 154.5,242" fill="#64748b"/>
  <text x="164" y="345" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#64748b" font-weight="bold">direct archival access</text>

  <!-- users log into dev env -->
  <line x1="1170" y1="230" x2="1170" y2="486" stroke="#aab4c2" stroke-width="2.4"/>
  <line x1="1170" y1="486" x2="1066" y2="486" stroke="#aab4c2" stroke-width="2.4"/>
  <polygon points="1060,486 1070,481.5 1070,490.5" fill="#aab4c2"/>
  <text x="1160" y="478" font-family="Liberation Sans, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="end">users log into</text>

  <text x="40" y="600" font-family="Liberation Sans, Arial, sans-serif" font-size="13" fill="#475569" font-style="italic">Teal = new data lake (Icechunk / Zarr · query engine · direct access). Grey = existing / neutral. Solid = primary read path; dashed = direct-to-data shortcuts.</text>
</svg>
