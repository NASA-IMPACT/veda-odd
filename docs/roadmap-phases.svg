<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540">
  <rect x="0" y="0" width="1200" height="540" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="60" fill="#0b2545"/>
  <rect x="0" y="56" width="1200" height="4" fill="#64748b"/>
  <text x="30" y="38" font-family="Liberation Sans, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold">ODD phases &#8212; notional timeline</text>
  <text x="1170" y="37" font-family="Liberation Sans, Arial, sans-serif" font-size="13" fill="#9fc6e0" text-anchor="end">Timelines are notional, not concrete</text>

  <!-- Phase 1: FY26.4 Now -->
  <rect x="30" y="92" width="360" height="296" rx="10" fill="#eef6f8" stroke="#0e7490" stroke-width="2.6"/>
  <rect x="30" y="92" width="360" height="40" rx="10" fill="#0e7490"/>
  <rect x="30" y="112" width="360" height="20" fill="#0e7490"/>
  <text x="48" y="119" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">FY26.4 &#183; Now</text>
  <text x="48" y="158" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold">Demonstrate the data lake</text>
  <text x="48" y="188" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; Icechunk data lake across varied data</text>
  <text x="62" y="206" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">types: HLS, NISAR, GPM IMERG,</text>
  <text x="62" y="224" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">NLDAS, TEMPO, &#8230;</text>
  <text x="48" y="250" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; VEDA instances demonstrate the</text>
  <text x="62" y="268" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">data lake with scientists</text>
  <text x="48" y="294" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; Migrate data services (TiTiler-CMR)</text>
  <text x="62" y="312" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">to the Data Services team</text>
  <text x="48" y="338" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; Socialization + capacity building</text>
  <text x="62" y="356" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">(coworking group, integration guide)</text>

  <!-- Phase 2: FY27 Next -->
  <rect x="420" y="92" width="360" height="296" rx="10" fill="#eef6f8" stroke="#0e7490" stroke-width="2.6"/>
  <rect x="420" y="92" width="360" height="40" rx="10" fill="#0e7490"/>
  <rect x="420" y="112" width="360" height="20" fill="#0e7490"/>
  <text x="438" y="119" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">FY27 &#183; Next</text>
  <text x="438" y="158" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold">AI integration + caching</text>
  <text x="438" y="188" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; Demonstrate AI integration with the</text>
  <text x="452" y="206" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">AI/ML teams (Water Insight / EIE)</text>
  <text x="438" y="232" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; LLMs discover, reason about, ingest</text>
  <text x="452" y="250" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">data from the lake</text>
  <text x="438" y="276" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; Demonstrate caching performance:</text>
  <text x="452" y="294" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">multiscale data cache in Icechunk</text>
  <text x="452" y="312" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">(a data cache, not a tiling cache)</text>

  <!-- Phase 3: Long term -->
  <rect x="810" y="92" width="360" height="296" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="2.2"/>
  <rect x="810" y="92" width="360" height="40" rx="10" fill="#64748b"/>
  <rect x="810" y="112" width="360" height="20" fill="#64748b"/>
  <text x="828" y="119" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">Long term</text>
  <text x="828" y="158" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold">Simplify</text>
  <text x="828" y="188" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; Deprecate HDF tooling; support</text>
  <text x="842" y="206" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">only Zarr tooling</text>
  <text x="828" y="232" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; Access only via the query engine</text>
  <text x="842" y="250" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">+ Zarr interfaces</text>
  <text x="828" y="276" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">&#8226; Not CMR, not archival files</text>
  <text x="842" y="294" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">(slow, costly, error-prone)</text>

  <!-- progression arrows -->
  <polygon points="412,240 396,231 396,249" fill="#94a3b8"/>
  <polygon points="802,240 786,231 786,249" fill="#94a3b8"/>

  <!-- Foundational band spanning all phases -->
  <rect x="30" y="412" width="1080" height="78" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <polygon points="1170,451 1110,427 1110,475" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="50" y="443" font-family="Liberation Sans, Arial, sans-serif" font-size="14" fill="#0f172a" font-weight="bold">Foundational &amp; ongoing &#8212; throughout all phases</text>
  <text x="50" y="468" font-family="Liberation Sans, Arial, sans-serif" font-size="12.5" fill="#334155">Zarr &#183; Icechunk &#183; obstore (IO) &#183; warp / resampling / projection &#183; reading Zarr + COG directly in the browser &#183; GeoZarr &amp; data standards</text>
</svg>
