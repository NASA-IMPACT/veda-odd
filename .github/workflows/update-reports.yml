name: Update Reports

on:
  schedule:
    # Run every Monday at 9 AM ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  reports:
    uses: NASA-IMPACT/dse-oss-reports/.github/workflows/reports.yml@ea8b15abf751cbac7cb65a02cd0238f368dec364  # v0.3.1
    permissions:
      contents: write
      pull-requests: write
    with:
      dse-oss-reports-ref: ea8b15abf751cbac7cb65a02cd0238f368dec364
    secrets:
      pat: ${{ secrets.GH_ODD_PAT }}
