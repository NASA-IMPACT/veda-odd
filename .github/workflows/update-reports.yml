name: Update Reports

on:
  schedule:
    # Run every Monday at 9 AM ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  reports:
    uses: NASA-IMPACT/dse-oss-reports/.github/workflows/reports.yml@ce47ad86bd8b53d69441671012e7ee64f0d8cc9b
    permissions:
      contents: write
      pull-requests: write
    with:
      dse-oss-reports-ref: ce47ad86bd8b53d69441671012e7ee64f0d8cc9b
    secrets:
      pat: ${{ secrets.GH_ODD_PAT }}
