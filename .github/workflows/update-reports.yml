name: Update Reports

on:
  schedule:
    # Run every Monday at 9 AM ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  reports:
    uses: NASA-IMPACT/dse-oss-reports/.github/workflows/reports.yml@a78beaa16d31e93efda623da927c8daa3b62dae1  # v0.4.0
    permissions:
      contents: write
      pull-requests: write
    with:
      dse-oss-reports-ref: a78beaa16d31e93efda623da927c8daa3b62dae1  # v0.4.0
    secrets:
      pat: ${{ secrets.GH_ODD_PAT }}
