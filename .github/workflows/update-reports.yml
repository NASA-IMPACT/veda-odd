name: Update Reports

on:
  schedule:
    # Run every Monday at 9 AM ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  reports:
    uses: NASA-IMPACT/dse-oss-reports/.github/workflows/reports.yml@e51addeb6bce68bc6320f8ff3f33289ec40b3772
    permissions:
      contents: write
      pull-requests: write
    with:
      dse-oss-reports-ref: e51addeb6bce68bc6320f8ff3f33289ec40b3772
    secrets:
      pat: ${{ secrets.GH_ODD_PAT }}
