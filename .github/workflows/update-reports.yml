name: Update Reports

on:
  schedule:
    # Run every Monday at 9 AM ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  reports:
    uses: NASA-IMPACT/dse-oss-reports/.github/workflows/reports.yml@8d70a3e05fa6d906486228ca383fd310a3f8ba60
    permissions:
      contents: write
      pull-requests: write
    with:
      dse-oss-reports-ref: 8d70a3e05fa6d906486228ca383fd310a3f8ba60
    secrets:
      pat: ${{ secrets.GH_ODD_PAT }}
